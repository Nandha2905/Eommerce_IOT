<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Seller</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .edit-form-container {
            max-width: 500px;
            margin: 2rem auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
        }
        .form-body {
            padding: 2.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.75rem;
        }
        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.875rem 1.25rem;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102,126,234,0.15);
        }
        .form-control.is-invalid {
            border-color: #ef4444;
        }
        .btn-update {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }
        .btn-cancel {
            border-radius: 12px;
            padding: 0.875rem 2rem;
            font-weight: 600;
            border: 2px solid #d1d5db;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="edit-form-container">
            <!-- Header -->
            <div class="form-header">
                <div class="d-flex align-items-center mb-2">
                    <i class="bi bi-person-circle fs-3 me-3"></i>
                    <h2 class="mb-0 fw-bold">Edit Seller</h2>
                </div>
                <p class="mb-0 opacity-75">Update Seller information</p>
            </div>

            <!-- Form -->
            <form th:action="@{/admin-api/update-seller}" 
                  th:object="${seller}" 
                  method="post" 
                  novalidate
                  class="needs-validation">

                <!-- Hidden ID -->
                <input type="hidden" th:field="*{id}" />

                <!-- Name Field -->
                <div class="mb-4">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text"
                           th:field="*{name}"
                           id="name"
                           class="form-control"
                           placeholder="Enter full name"
                           required
                           maxlength="100" />
                    <div class="invalid-feedback">
                 name
                    </div>
                </div>

                <!-- Email Field -->
                <div class="mb-4">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email"
                           th:field="*{email}"
                           id="email"
                           class="form-control"
                           placeholder="customer@example.com"
                           required />
                    <div class="invalid-feedback">
                        email address.
                    </div>
                </div>

                <!-- Phone Field -->
                <div class="mb-5">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel"
                           th:field="*{Phone_Number}"
                           id="phone"
                           class="form-control"
                           placeholder="Enter phone number"
                           pattern="[0-9\s\-\+\(\)]{10}"
                           required />
                    <div class="invalid-feedback">
                        phone number (10).
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex gap-3 justify-content-end p-4 border-top bg-light">
                    <a th:href="@{/admin-api/manage-seller}" class="btn btn-cancel">
                        <i class="bi bi-arrow-left me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-update text-white">
                        <i class="bi bi-check-lg me-2"></i>Update Seller
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Form Validation -->
    <script>
        (function () {
            'use strict';
            
            // Bootstrap validation
            window.addEventListener('load', function () {
                var forms = document.getElementsByClassName('needs-validation');
                Array.prototype.filter.call(forms, function (form) {
                    form.addEventListener('submit', function (event) {
                        if (form.checkValidity() === false) {
                            event.preventDefault();
                            event.stopPropagation();
                        }
                        form.classList.add('was-validated');
                    }, false);
                });
            }, false);
        })();
    </script>
</body>
</html>
