<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[readonly] {
            background-color: #e9ecef;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .back-btn {
            text-align: center;
            margin-top: 10px;
        }

        .back-btn a {
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Edit Profile</h2>

    <form th:action="@{/user-api/edit-profile}" th:object="${user}" method="post">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}" />

        <label>Name</label>
        <input type="text" th:field="*{name}" required />

        <label>Email</label>
        <input type="email" th:field="*{email}" readonly />

        <label>Mobile Number</label>
        <input type="text" th:field="*{phone_Number}" />

        <button type="submit">Update Profile</button>
    </form>

    <div class="back-btn">
        <a th:href="@{/user-api/dashboard}">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
