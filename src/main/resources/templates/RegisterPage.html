<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - E-Store</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.register-container {
    background: #fff;
    padding: 2.5rem;
    border-radius: 20px;
    width: 100%;
    max-width: 750px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.register-header {
    text-align: center;
    margin-bottom: 2rem;
}

.register-header h1 {
    color: #2c3e50;
}

.register-header p {
    color: #6c757d;
}

form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.full-width {
    grid-column: span 2;
}

label {
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: #2c3e50;
}

input, select {
    width: 100%;
    padding: 1rem;
    border-radius: 10px;
    border: 2px solid #e9ecef;
    font-size: 1rem;
}

input:focus, select:focus {
    outline: none;
    border-color: #3498db;
}

input.error {
    border-color: #e74c3c;
}

.error-message {
    color: #e74c3c;
    font-size: 0.85rem;
    margin-top: 0.3rem;
    display: none;
}

.error-message.show {
    display: block;
}

.register-btn {
    grid-column: span 2;
    background: #27ae60;
    color: white;
    padding: 1rem;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    cursor: pointer;
}

.register-btn:disabled {
    background: #bdc3c7;
}

.login-link {
    margin-top: 1.5rem;
    text-align: center;
}

.login-link a {
    color: #3498db;
    text-decoration: none;
}

@media (max-width: 600px) {
    form {
        grid-template-columns: 1fr;
    }

    .full-width,
    .register-btn {
        grid-column: span 1;
    }
}
</style>
</head>

<body>

<div class="register-container">

    <div class="register-header">
        <h1>Create Account</h1>
        <p>Join E-Store today</p>
    </div>

    <form id="registerForm" action="/login-api/register" method="POST">

        <!-- USER DETAILS -->
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="Phone_Number" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
            <label>Register As</label>
            <select name="role" required>
                <option value="">Select your role</option>
                <option value="CUSTOMER">👤 Customer</option>
                <option value="SELLER">🏪 Seller</option>
            </select>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
            <div class="error-message" id="confirmError">Passwords do not match</div>
        </div>

        <!-- ADDRESS SECTION -->
        <div class="form-group">
            <label>Street</label>
            <input type="text" name="street" placeholder="Street / House No / Area" required>
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" name="city" placeholder="Enter your city" required>
        </div>

        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" placeholder="Enter your state" required>
        </div>

        <div class="form-group full-width">
            <label>Pincode</label>
            <input type="text" name="pincode" placeholder="Enter pincode" required>
        </div>

        <button type="submit" class="register-btn" id="registerBtn">
            Create Account
        </button>

    </form>

    <div class="login-link">
        Already have an account? <a href="/login-form">Sign in here</a>
    </div>

</div>

<script>
const form = document.getElementById("registerForm");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const confirmError = document.getElementById("confirmError");
const registerBtn = document.getElementById("registerBtn");

function validatePasswords() {
    if (confirmPassword.value === "") {
        confirmError.classList.remove("show");
        confirmPassword.classList.remove("error");
        registerBtn.disabled = false;
        return;
    }

    if (password.value !== confirmPassword.value) {
        confirmPassword.classList.add("error");
        confirmError.classList.add("show");
        registerBtn.disabled = true;
    } else {
        confirmPassword.classList.remove("error");
        confirmError.classList.remove("show");
        registerBtn.disabled = false;
    }
}

password.addEventListener("input", validatePasswords);
confirmPassword.addEventListener("input", validatePasswords);

form.addEventListener("submit", function(e) {
    if (password.value !== confirmPassword.value) {
        e.preventDefault();
        alert("Passwords do not match");
    }
});
</script>

</body>
</html>
