<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Order Successful</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #f0fdf4, #e0f2fe);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  background:#ffffff;
  padding:45px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
  text-align:center;
  max-width:450px;
  animation: fadeIn 0.6s ease-in-out;
}

.check-circle {
  width:90px;
  height:90px;
  border-radius:50%;
  background:#dcfce7;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:45px;
  color:#16a34a;
  animation: pop 0.5s ease;
}

h1 {
  color:#16a34a;
  margin:20px 0 10px;
  font-size:24px;
}

p {
  color:#4b5563;
  font-size:15px;
  line-height:1.6;
}

.order-info {
  background:#f9fafb;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
  font-size:14px;
  color:#374151;
}

.btn-group {
  margin-top:30px;
}

a {
  text-decoration:none;
  display:inline-block;
  padding:12px 22px;
  margin:8px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  transition:0.3s;
}

.btn-home {
  background:#111827;
  color:#fff;
}

.btn-orders {
  background:#2563eb;
  color:#fff;
}

a:hover {
  transform:translateY(-3px);
  opacity:0.9;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes pop {
  0% { transform:scale(0.5); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}
</style>
</head>

<body>

<div class="card">

  <div class="check-circle">✔</div>

  <h1>Order Placed Successfully!</h1>

  <p>
    Thank you for shopping with us.<br>
    Your order has been confirmed and is being processed.
  </p>

  <!-- Optional Order Info -->
  <div class="order-info">
    Order ID: <strong th:text="${orderId}">#12345</strong><br>
    Estimated Delivery: <strong>3-5 Business Days</strong>
  </div>

  <div class="btn-group">
    <a href="/user-api/home" class="btn-home">Continue Shopping</a>

    <a th:href="@{/order-api/orders/{userid}(userid=${Users.id})}"
       class="btn-orders">
       View My Orders
    </a>
  </div>

</div>

</body>
</html>
