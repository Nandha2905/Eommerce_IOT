<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #f8f9fa;
}

.profile-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.profile-avatar {
    width: 100px;
    height: 100px;
    background: #232f3e;
    color: white;
    font-size: 40px;
    font-weight: 600;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.label-title {
    font-size: 14px;
    color: #6c757d;
}

.value-text {
    font-size: 16px;
    font-weight: 600;
}

.btn-custom {
    border-radius: 30px;
    padding: 8px 20px;
}
</style>
</head>

<body>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-8">

<div class="profile-card text-center">

    <!-- Avatar -->
    <div class="d-flex justify-content-center mb-4">
        <div class="profile-avatar"
             th:text="${#strings.substring(User.name,0,1)}">
            S
        </div>
    </div>

    <!-- Name -->
    <h3 class="fw-bold mb-1" th:text="${User.name}">Seller Name</h3>
    <p class="text-muted mb-4">Seller Account</p>

    <hr>

    <!-- Details -->
    <div class="row text-start mt-4">

        <div class="col-md-6 mb-3">
            <div class="label-title">Full Name</div>
            <div class="value-text" th:text="${User.name}">Name</div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="label-title">Email Address</div>
            <div class="value-text" th:text="${User.email}">email@example.com</div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="label-title">Role</div>
            <div class="value-text" th:text="${User.role}">SELLER</div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="label-title">Seller ID</div>
            <div class="value-text" th:text="${User.id}">1</div>
        </div>

    </div>

    <hr class="my-4">

    <!-- Buttons -->
    <div class="d-flex justify-content-center gap-3">

        <a th:href="@{/seller-api/dashboard}"
           class="btn btn-outline-dark btn-custom">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>

        <a th:href="@{/logout}"
           class="btn btn-danger btn-custom">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
