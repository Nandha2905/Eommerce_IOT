<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Product | Seller Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #232f3e;
            --accent-color: #ff9900;
            --light-bg: #f4f6f9;
            --card-radius: 14px;
            --shadow-soft: 0 4px 15px rgba(0,0,0,0.06);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.12);
            --muted-border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            padding: 2rem;
        }

        .form-card {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--muted-border);
            max-width: 650px;
            margin: auto;
            padding: 2rem;
            transition: 0.3s ease;
        }

        .form-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .form-label {
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid var(--muted-border);
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(35, 47, 62, 0.05);
            background: white;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            border: 2px solid #374151;
        }

        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-dark-custom {
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-dark-custom:hover {
            background: #1a2533;
            transform: translateY(-2px);
        }

        .btn-outline-custom {
            border: 1px solid var(--muted-border);
            color: var(--primary-color);
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
        }

        .btn-outline-custom:hover {
            background: rgba(35, 47, 62, 0.08);
            border-color: rgba(35, 47, 62, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<div class="form-card">

    <h3 class="mb-4 text-center">
        <i class="bi bi-pencil-square me-2"></i>Edit Product
    </h3>

    <form th:action="@{/seller-api/update-products/{id}(id=${product.productId})}" method="post">

        <!-- Hidden ID -->
        <input type="hidden" name="productId" th:value="${product.productId}" />

        <!-- Product Name -->
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="productName"
                   class="form-control"
                   th:value="${product.productName}" required>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" rows="4"
                      class="form-control" required
                      th:text="${product.description}"></textarea>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="categoryId" class="form-select" required>
                <option value="">Select Category</option>
                <option th:each="cat : ${categoryList}"
                        th:value="${cat.categoryId}"
                        th:text="${cat.categoryName}"
                        th:selected="${product.category != null and product.category.categoryId == cat.categoryId}">
                </option>
            </select>
        </div>

        <!-- Price & Stock -->
        <div class="row mb-4">
            <div class="col-md-6 mb-3">
                <label class="form-label">Price (₹)</label>
                <input type="number" step="0.01" min="0.01" name="price"
                       class="form-control" th:value="${product.price}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Stock</label>
                <input type="number" min="0" name="stock"
                       class="form-control" th:value="${product.stock}" required>
            </div>
        </div>

        <!-- Product Status -->
        <div class="mb-4">
            <div class="section-title">Status</div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="active" value="true"
                       th:checked="${product.active}">
                <label class="form-check-label">Active</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="active" value="false"
                       th:checked="${!product.active}">
                <label class="form-check-label">Disabled</label>
            </div>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-end gap-3">
            <a href="/seller-api/manage-seller-products" class="btn btn-outline-custom">Cancel</a>
            <button type="submit" class="btn btn-dark-custom">Update Product</button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
