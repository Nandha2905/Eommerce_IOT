<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Products | Seller Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #232f3e;
            --accent-color: #ff9900;
            --light-bg: #f4f6f9;
            --card-radius: 14px;
            --shadow-soft: 0 4px 15px rgba(0,0,0,0.06);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.12);
            
            /* Muted soft colors */
            --muted-bg: #f8fafc;
            --muted-border: #e2e8f0;
            --soft-primary: #f1f5f9;
            --soft-success: #f0fdf4;
            --soft-danger: #fef2f2;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
        }

        /* ================= NAVBAR ================= */
        .navbar {
            border-bottom: 3px solid var(--accent-color);
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
        }

        .seller-name {
            font-weight: 600;
            color: var(--primary-color);
        }

        /* ================= SUMMARY CARDS ================= */
        .summary-card {
            background: var(--muted-bg);
            border-radius: var(--card-radius);
            padding: 1.8rem;
            box-shadow: var(--shadow-soft);
            transition: 0.3s ease;
            border-left: 4px solid var(--accent-color);
            border: 1px solid var(--muted-border);
        }

        .summary-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }

        .summary-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            background: rgba(35, 47, 62, 0.08);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* ================= Muted Card Backgrounds ================= */
        .bg-primary-gradient {
            background: var(--soft-primary);
            border-left-color: rgba(35, 47, 62, 0.2);
        }

        .bg-success-gradient {
            background: var(--soft-success);
            border-left-color: rgba(34, 197, 94, 0.15);
        }

        .bg-danger-gradient {
            background: var(--soft-danger);
            border-left-color: rgba(239, 68, 68, 0.15);
        }

        /* ================= TABLE SECTION ================= */
        .table-container {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            border: 1px solid var(--muted-border);
        }

        .table thead th {
            background: var(--primary-color);
            color: white;
            padding: 1rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .table tbody tr {
            transition: 0.2s ease;
        }

        .table tbody tr:hover {
            background-color: rgba(248, 250, 252, 0.8);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.45rem 0.75rem;
            border-radius: 20px;
            font-weight: 500;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.1);
            color: #059669;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-disabled {
            background: rgba(239, 68, 68, 0.08);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .price {
            font-weight: 600;
            color: var(--primary-color);
        }

        /* ================= BUTTONS - Muted Style ================= */
        .btn-gradient-primary,
        .btn-gradient-success,
        .btn-gradient-danger,
        .btn-primary,
        .btn-success {
            background: var(--muted-bg) !important;
            border: 1px solid var(--muted-border) !important;
            color: var(--primary-color) !important;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* ================= BUTTONS - Dark Professional Style ================= */

.btn-gradient-primary,
.btn-primary {
    background: var(--primary-color) !important;
    border: 1px solid var(--primary-color) !important;
    color: white !important;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.3s ease;
}

.btn-gradient-success,
.btn-success {
    background: #1f2937 !important;
    border: 1px solid #1f2937 !important;
    color: white !important;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.3s ease;
}

.btn-gradient-danger {
    background: #374151 !important;
    border: 1px solid #374151 !important;
    color: white !important;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.3s ease;
}

/* Hover Effects */
.btn-gradient-primary:hover,
.btn-primary:hover {
    background: #1a2533 !important;
    border-color: #1a2533 !important;
    transform: translateY(-2px);
}

.btn-gradient-success:hover {
    background: #111827 !important;
    border-color: #111827 !important;
    transform: translateY(-2px);
}

.btn-gradient-danger:hover {
    background: #1f2937 !important;
    border-color: #1f2937 !important;
    transform: translateY(-2px);
}

        .btn-outline-primary {
            border-color: var(--muted-border);
            color: var(--text-muted);
            background: rgba(248, 250, 252, 0.6);
        }

        .btn-outline-primary:hover {
            background: var(--soft-primary);
            color: var(--primary-color);
            border-color: rgba(35, 47, 62, 0.2);
        }

        /* ================= PRODUCT CARDS ================= */
        .product-card {
            background: var(--muted-bg);
            border: 1px solid var(--muted-border);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            background: white;
            box-shadow: var(--shadow-hover);
            border-color: rgba(35, 47, 62, 0.1);
        }

        .product-card.disabled {
            background: rgba(248, 250, 252, 0.5);
            opacity: 0.7;
        }

        .price-tag {
            background: var(--soft-primary);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* ================= EMPTY STATE ================= */
        .empty-box {
            background: var(--muted-bg);
            border: 1px solid var(--muted-border);
            border-radius: var(--card-radius);
        }

        /* ================= SEARCH BOX ================= */
        .search-box {
            background: var(--muted-bg);
            border: 1px solid var(--muted-border);
            border-radius: 12px;
            padding: 0.875rem 1.25rem;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            background: white;
            border-color: rgba(35, 47, 62, 0.2);
            box-shadow: 0 0 0 3px rgba(35, 47, 62, 0.05);
        }

        /* ================= PAGE HEADER ================= */
        .page-header {
            background: white;
            padding: 2rem;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--muted-border);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<div class="container py-4">

    <!-- HEADER -->
	<!-- HEADER -->
	<div class="page-header d-flex justify-content-between align-items-center">
	    <div>
	        <h3 class="fw-bold mb-1">
	            <i class="bi bi-box-seam me-2"></i>Manage Products
	        </h3>
	        <p class="text-muted mb-0">Organize and control your product catalog</p>
	    </div>

	    <div class="d-flex gap-2">
	        <!-- Back Button -->
	        <a th:href="@{/seller-api/dashboard}" 
	           class="btn btn-outline-custom px-4">
	            <i class="bi bi-arrow-left me-2"></i>Back
	        </a>

	        <!-- Add Product Button -->
	        <a th:href="@{/seller-api/add-products-form}" 
	           class="btn btn-gradient-success px-4">
	            <i class="bi bi-plus-circle me-2"></i>Add Product
	        </a>
	    </div>
	</div>

    <!-- SUMMARY SECTION -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="summary-card bg-primary-gradient">
                <h6>Total Products</h6>
                <h3 th:text="${productList.size()}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="summary-card bg-success-gradient">
                <h6>Active Products</h6>
                <h3 th:text="${productList.?[active].size()}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="summary-card bg-danger-gradient">
                <h6>Disabled Products</h6>
                <h3 th:text="${productList.?[!active].size()}">0</h3>
            </div>
        </div>
    </div>


    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(productList)}" class="empty-box">
        <i class="bi bi-box display-3 text-muted"></i>
        <h4 class="mt-3">No Products Available</h4>
        <p class="text-muted">Start by adding your first product.</p>

        <a th:href="@{/seller-api/add-products-form}" 
           class="btn btn-gradient-primary mt-3">
            Add Product
        </a>
    </div>

    <!-- PRODUCT GRID -->
    <div class="row g-4" th:if="${!#lists.isEmpty(productList)}">

        <div class="col-xl-3 col-lg-4 col-md-6"
             th:each="product : ${productList}">

            <div class="product-card p-4"
                 th:classappend="${!product.active} ? ' disabled'">

                <span class="status-badge"
                      th:text="${product.active} ? 'Active' : 'Disabled'"
                      th:classappend="${product.active} ? ' status-active' : ' status-disabled'">
                </span>

                <h6 class="fw-bold mb-2"
                    th:text="${product.productName}">
                    Product Name
                </h6>

                <p class="text-muted small mb-3"
                   th:text="${product.description}">
                </p>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="price-tag"
                          th:text="'₹' + ${#numbers.formatDecimal(product.price,0,2)}">
                    </span>

                    <span class="badge bg-light text-dark"
                          th:text="'Stock: ' + ${product.stock}">
                    </span>
                </div>

                <div class="d-grid gap-2">

                    <!-- EDIT -->
                    <a th:href="@{'/seller-api/update-products-form/' + ${product.productId}}"
                       class="btn btn-gradient-primary btn-sm">
                        <i class="bi bi-pencil me-1"></i>Edit
                    </a>

                    <!-- ENABLE / DISABLE -->
                    <a th:href="@{/seller-api/toggle-product/{id}(id=${product.productId})}"
                       th:class="${product.active} ? 
                                  'btn btn-gradient-danger btn-sm' : 
                                  'btn btn-gradient-success btn-sm'"
                       onclick="return confirm('Are you sure you want to change product status?')">

                        <i th:class="${product.active} ? 
                                     'bi bi-slash-circle me-1' : 
                                     'bi bi-check-circle me-1'"></i>

                        <span th:text="${product.active} ? 'Disable' : 'Enable'"></span>
                    </a>

                </div>

            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
