<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${categoryName} + ' - ShopHub'">Category Products - ShopHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
		:root {
		    --primary-color: #232f3e;
		    --accent-color: #ff9900;
		    --light-bg: #f8f9fa;
		}

		body {
		    font-family: 'Inter', sans-serif;
		    background-color: var(--light-bg);
		    color: #2c3e50;
		}

		/* ================= HEADER ================= */
		header {
		    position: sticky;
		    top: 0;
		    background: #ffffff;
		    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
		    z-index: 100;
		    padding: 0.8rem 0;
		}

		.header-container {
		    max-width: 1200px;
		    margin: auto;
		    padding: 0 1.5rem;
		    display: flex;
		    align-items: center;
		    justify-content: space-between;
		    gap: 1.5rem;
		}

		.logo {
		    font-size: 1.6rem;
		    font-weight: 700;
		    color: var(--primary-color);
		    text-decoration: none;
		}

		.search-input {
		    width: 100%;
		    padding: 0.65rem 1rem 0.65rem 2.8rem;
		    border-radius: 50px;
		    border: 1px solid #dee2e6;
		    transition: 0.3s ease;
		}

		.search-input:focus {
		    border-color: var(--primary-color);
		    box-shadow: 0 0 0 3px rgba(35,47,62,0.1);
		    outline: none;
		}

		/* ================= CATEGORY HEADER ================= */
		.content-header {
		    background: linear-gradient(135deg, var(--primary-color), #3a506b);
		    color: white;
		    padding: 3rem 0;
		    margin: 2rem 0 3rem;
		    border-radius: 16px;
		    text-align: center;
		}

		.content-header h1 {
		    font-size: 2.2rem;
		    font-weight: 700;
		}

		.content-header p {
		    font-size: 1.1rem;
		    opacity: 0.9;
		}

		/* ================= PRODUCTS GRID ================= */
		.products-grid {
		    display: grid;
		    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
		    gap: 2rem;
		}

		/* ================= PRODUCT CARD ================= */
		.product-card {
		    background: white;
		    border-radius: 16px;
		    overflow: hidden;
		    transition: 0.3s ease;
		    border: 1px solid #eee;
		    display: flex;
		    flex-direction: column;
		}

		.product-card:hover {
		    transform: translateY(-6px);
		    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
		}

		/* Product Image */
		.product-image {
		    width: 100%;
		    height: 220px;
		    object-fit: contain;
		    background: #f9f9f9;
		    padding: 1rem;
		}

		/* Product Info */
		.product-info {
		    padding: 1.5rem;
		    display: flex;
		    flex-direction: column;
		    flex-grow: 1;
		}

		.product-name {
		    font-size: 1.05rem;
		    font-weight: 600;
		    margin-bottom: 0.8rem;
		    min-height: 45px;
		}

		.product-price {
		    font-size: 1.4rem;
		    font-weight: 700;
		    color: var(--accent-color);
		    margin-bottom: 1rem;
		}

		/* Buttons */
		.product-actions {
		    margin-top: auto;
		    display: flex;
		    gap: 0.8rem;
		}

		.btn {
		    flex: 1;
		    border-radius: 8px;
		    font-weight: 600;
		    font-size: 0.9rem;
		    padding: 0.6rem;
		}

		.btn-primary {
		    background: var(--primary-color);
		    border: none;
		}

		.btn-primary:hover {
		    background: #1b2530;
		}

		.btn-secondary {
		    background: white;
		    border: 1px solid #ccc;
		    color: var(--primary-color);
		}

		.btn-secondary:hover {
		    background: var(--primary-color);
		    color: white;
		}

		/* ================= NO PRODUCTS ================= */
		.no-products {
		    text-align: center;
		    padding: 4rem 1rem;
		}

		.no-products i {
		    font-size: 4rem;
		    opacity: 0.4;
		}

		/* ================= RESPONSIVE ================= */
		@media (max-width: 768px) {
		    .product-actions {
		        flex-direction: column;
		    }

		    .content-header h1 {
		        font-size: 1.6rem;
		    }
		}
    </style>
</head>
<body>

   

    <main role="main">
        <div class="container-main">
            <!-- Content Header -->
            <div class="content-header">
                <h1 th:text="${categoryName}">Category Name</h1>
                <p th:text="${#lists.size(products)} + ' products available'" class="mb-0">
                    X products available
                </p>
            </div>

            <!-- Products Section -->
            <section class="section" aria-labelledby="products-title">
                <h2 id="products-title" class="section-title">Products</h2>
                
                <!-- No Products -->
                <div th:if="${#lists.isEmpty(products)}" class="no-products">
                    <i class="bi bi-inbox"></i>
                    <h3 class="h2 mb-3">No products found</h3>
                    <p class="fs-5 mb-4">Check back later for new arrivals in this category</p>
                    <a href="/user-api/home" class="btn btn-primary">
                        <i class="bi bi-house"></i>
                        Continue Shopping
                    </a>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" th:unless="${#lists.isEmpty(products)}">
                    <article th:each="product : ${products}" class="product-card">
                        
						<img th:if="${product.image != null}"
										         th:src="@{${product.image.productImgUrl}}"
										         th:alt="${product.productName}"
										         class="product-image"
										         loading="lazy">

                        <div class="product-info">
                            <h3 class="product-name" th:text="${product.productName}">Product Name</h3>

                            <div class="product-price">
                                ₹<span th:text="${product.price}">0</span>
                            </div>

                            <div class="product-actions">
                                <!-- Add to Cart -->
                                <form th:action="@{/cart-api/add-cart/{id}(id=${product.productId})}" 
                                      method="post" style="flex:1;">
                                    <input type="hidden" name="q" value="1" />
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-cart-plus"></i>
                                        Add to Cart
                                    </button>
                                </form>

                                <!-- Buy Now -->
                                <a th:href="@{/order-api/buy-now/{productId}(productId=${product.productId})}" 
                                   class="btn btn-secondary">
                                    <i class="bi bi-lightning-charge"></i>
                                    Buy Now
                                </a>
                            </div>
                        </div>
                    </article>
                </div>
            </section>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
