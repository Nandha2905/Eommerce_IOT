<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Place Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 40px 15px;
}

.wrapper {
  max-width: 750px;
  margin: auto;
  background: #fff;
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.06);
}

h2 {
  margin-bottom: 20px;
  font-weight: 600;
}

.section {
  margin-bottom: 30px;
}

.summary-box {
  background: #f9fafb;
  padding: 18px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.total {
  font-size: 18px;
  font-weight: bold;
  margin-top: 15px;
}

input[type="radio"] {
  width: 14px;
  height: 14px;
  transform: scale(0.85);
  margin-right: 8px;
  accent-color: #111827;
  cursor: pointer;
}

.address-option label {
  display: flex;
  align-items: center;
  font-size: 14px;
  gap: 6px;
}

.address-option {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  margin-bottom: 10px;
  cursor: pointer;
}

.address-option:hover {
  background: #f3f4f6;
}

textarea, input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  margin-top: 8px;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #111827;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #000;
  transform: translateY(-2px);
}

hr {
  border: none;
  border-top: 1px solid #eee;
  margin: 25px 0;
}
</style>
</head>

<body>

<div class="wrapper">

<h2>Checkout</h2>

<!-- ================= PRODUCT SUMMARY ================= -->
<div class="section" th:if="${orderType == 'BUY_NOW'}">
  <div class="summary-box">

    <div class="summary-row">
      <span th:text="${product.productName}"></span>
      <span>₹<span th:text="${product.price}"></span></span>
    </div>

    <div class="summary-row">
      <span>Quantity</span>
      <span th:text="${quantity}"></span>
    </div>

    <hr>

    <div class="summary-row total">
      <span>Total</span>
      <span>₹<span th:text="${product.price * quantity}"></span></span>
    </div>

  </div>
</div>

<!-- ================= USER INFO ================= -->
<div class="section">
  <strong th:text="${user.name}"></strong><br>
  <span th:text="${user.email}"></span>
</div>

<!-- ================= FORM ================= -->
<form th:action="@{/order-api/place}" method="post">

  <input type="hidden" name="orderType" th:value="${orderType}">
  <input type="hidden" name="userId" th:value="${user.id}">

  <input type="hidden" name="productId"
         th:if="${orderType == 'BUY_NOW'}"
         th:value="${product.productId}">

  <input type="hidden" name="quantity"
         th:if="${orderType == 'BUY_NOW'}"
         th:value="${quantity}">

  <!-- ================= ADDRESS ================= -->
  <div class="section">
    <h3>Delivery Address</h3>

    <!-- DEFAULT -->
    <div class="address-option">
      <label>
        <input type="radio" name="addressType"
               value="DEFAULT"
               checked
               onclick="toggleAddress(false)">
        Use Default Address
      </label>

      <div style="margin-top:8px; font-size:14px; color:#555;">
        <span th:text="${defaultAddress.street}"></span><br>
        <span th:text="${defaultAddress.city}"></span>,
        <span th:text="${defaultAddress.state}"></span> -
        <span th:text="${defaultAddress.pincode}"></span>
      </div>
    </div>

    <!-- CUSTOM -->
    <div class="address-option">
      <label>
        <input type="radio" name="addressType"
               value="CUSTOM"
               onclick="toggleAddress(true)">
        Enter New Address
      </label>
    </div>

    <div id="customAddress" style="display:none;">
      <input type="text" name="street" placeholder="Street">
      <input type="text" name="city" placeholder="City">
      <input type="text" name="state" placeholder="State">
      <input type="text" name="pincode" placeholder="Pincode">
    </div>
  </div>

  <!-- ================= PLACE ORDER BUTTON ================= -->
  <button type="submit">Place Order</button>

</form>

</div>

<script>
function toggleAddress(isCustom) {
  document.getElementById("customAddress").style.display =
    isCustom ? "block" : "none";
}
</script>

</body>
</html>
