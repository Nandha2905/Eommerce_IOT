<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order #<span th:text="${order.orderId}">12345</span> - Items</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #232f3e;
            --accent: #ff9900;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        * { font-family: 'Inter', sans-serif; }

        body {
            background: #f8f9fa;
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            background: white;
            border-radius: var(--border-radius) var(--border-radius) 0 0;
            box-shadow: var(--shadow);
            padding: 1.5rem 2rem;
            margin: -2rem -2rem 2rem -2rem;
        }

        .content-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .table thead th {
            background: var(--primary);
            color: white;
            font-weight: 600;
            padding: 1rem 1.5rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table tbody td {
            padding: 1.25rem 1.5rem;
            vertical-align: middle;
        }

		.status-badge {
				    display: inline-block;
				    padding: 6px 18px;
				    border-radius: 50px;
				    font-weight: 600;
				    font-size: 13px;
				    letter-spacing: 0.5px;
				}

        .btn-back {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .total-row {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .header { margin: -1rem -1rem 1.5rem -1rem; padding: 1rem; }
        }
    </style>
</head>

<body>
    <!-- Page Header -->
    <div class="header">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div>
                <h2 class="mb-1 fw-bold" th:text="'Order #' + ${order.orderId}">Order #12345</h2>
                <p class="mb-0 text-muted" th:text="${order.status}">Processing</p>
            </div>
            <a th:href="@{/admin-api/manage-orders}" class="btn btn-outline-primary btn-back">
                <i class="bi bi-arrow-left me-1"></i>Orders
            </a>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row g-4">
            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="content-card p-4 h-100">
                    <h6 class="fw-bold mb-4 text-uppercase text-muted small">Summary</h6>
                    
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Order ID</span>
                        <strong th:text="${order.orderId}">12345</strong>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-4">
                        <span class="text-muted">Items</span>
                        <strong th:text="${#lists.size(items)}">3</strong>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-4">
                        <span class="text-muted">Status</span>
						<span class="status-badge"
															      th:text="${order.status}">
															</span>
                    </div>
                    
                    <a th:href="@{/admin-api/manage-orders}" class="btn btn-outline-primary btn-back w-100">
                        <i class="bi bi-arrow-left me-1"></i>Back to Orders
                    </a>
                </div>
            </div>

            <!-- Order Items -->
            <div class="col-lg-8">
                <div class="content-card">
                    <div class="p-4 border-bottom">
                        <h6 class="fw-bold mb-0" th:text="'Items (' + ${#lists.size(items)} + ')'">Items (3)</h6>
                    </div>

                    <!-- No Items -->
                    <div th:if="${#lists.isEmpty(items)}" class="text-center py-5">
                        <i class="bi bi-inbox display-4 text-muted mb-3"></i>
                        <h5 class="text-muted mb-4">No items in this order</h5>
                        <a th:href="@{/admin-api/manage-orders}" class="btn btn-outline-primary btn-back">
                            <i class="bi bi-arrow-left"></i>View Orders
                        </a>
                    </div>

                    <!-- Items Table -->
                    <div th:unless="${#lists.isEmpty(items)}">
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>Qty</th>
                                        <th>Price</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${items}">
                                        <td>
                                            <div class="fw-semibold mb-1" th:text="${item.productName}">Product Name</div>
                                            <small class="text-muted">SKU: <span th:text="${item.productId}">PROD001</span></small>
                                        </td>
                                        <td>
                                            <span class="badge bg-primary px-3 py-1" th:text="${item.quantity}">2</span>
                                        </td>
                                        <td class="fw-semibold">₹<span th:text="${item.price}">1250</span></td>
                                        <td class="fw-bold text-success">
                                            ₹<span th:text="${#numbers.formatDecimal(item.quantity * item.price, 1, 2)}">2500</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Grand Total -->
                        <div class="p-4 total-row">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="h6 fw-bold mb-0">Grand Total</span>
                                <span class="h5 fw-bold text-primary mb-0">
                                    ₹<span th:text="${#numbers.formatDecimal(grandTotal, 1, 2)}">15000</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
