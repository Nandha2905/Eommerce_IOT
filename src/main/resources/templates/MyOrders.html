<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>My Orders</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(to right,#eef2ff,#f8fafc);
    padding:40px;
    color:#1e293b;
}

/* Container */
.container{
    max-width:1100px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:30px;
}

/* User Welcome Card */
.user-box{
    background:white;
    padding:25px 30px;
    border-radius:14px;
    box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.user-box h2{
    font-weight:600;
    margin-bottom:6px;
}

.user-box p{
    color:#64748b;
    font-size:0.95rem;
}

/* Section Title */
.section-title{
    font-size:1.4rem;
    font-weight:600;
    border-left:4px solid #4f46e5;
    padding-left:10px;
}

/* Orders Card */
.orders-card{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#111827;
    color:white;
    padding:14px;
    font-size:0.9rem;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

td{
    padding:14px;
    border-bottom:1px solid #e5e7eb;
    font-size:0.95rem;
}

tr:hover{
    background:#f8fafc;
}

/* Status Badge */
.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:0.75rem;
    font-weight:600;
    display:inline-block;
}

.status-delivered{
    background:#dcfce7;
    color:#15803d;
}

.status-pending{
    background:#fef9c3;
    color:#b45309;
}

.status-cancelled{
    background:#fee2e2;
    color:#b91c1c;
}

/* Action Link */
.action-link{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.action-link:hover{
    text-decoration:underline;
}

/* Empty */
.empty{
    text-align:center;
    padding:40px;
    background:white;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    color:#64748b;
}

/* Responsive */
@media(max-width:768px){
    body{
        padding:20px;
    }

    table{
        font-size:0.85rem;
    }

    th, td{
        padding:10px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- USER INFO -->
    <div class="user-box">
        <h2>Welcome, <span th:text="${User.name}">User Name</span> 👋</h2>
        <p>Email: <span th:text="${User.email}">email</span></p>
    </div>

    <div class="section-title">My Orders</div>

    <!-- If no orders -->
    <div class="empty" th:if="${#lists.isEmpty(Orders)}">
        No orders found 😕
    </div>

    <!-- Orders Table -->
    <div class="orders-card" th:if="${!#lists.isEmpty(Orders)}">
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="order : ${Orders}">
                    <td th:text="${order.OrderId}">1</td>
                    <td th:text="${order.orderDate}">2026-02-09</td>
                    <td>₹<span th:text="${order.total_amount}">999</span></td>

                    <td>
                        <span class="status"
                              th:classappend="
                                  ${order.status}=='DELIVERED' ? ' status-delivered' :
                                  (${order.status}=='PENDING' ? ' status-pending' :
                                  ' status-cancelled')"
                              th:text="${order.status}">
                            DELIVERED
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/order-api/order-items/{orderId}(orderId=${order.orderId})}"
                           class="action-link">
                           View Items
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
