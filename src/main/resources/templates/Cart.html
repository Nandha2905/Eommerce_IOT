<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Shopping Cart - E-Shop</title>

<link th:href="@{/css/cart.css}" rel="stylesheet">

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background:#f1f5f9;
    margin:0;
}

/* Header */
.header{
    background:#111827;
    color:white;
    padding:18px 40px;
    font-size:22px;
    font-weight:600;
}

/* Main Layout */
.container{
    max-width:1200px;
    margin:40px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

/* Cart Card */
.cart-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:15px 10px;
    font-size:14px;
    color:#64748b;
    border-bottom:1px solid #e2e8f0;
}

td{
    padding:20px 10px;
    border-bottom:1px solid #f1f5f9;
}

/* Product section */
.product-info{
    display:flex;
    align-items:center;
    gap:15px;
}

.product-img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #e2e8f0;
}

/* Price */
.price{
    font-weight:600;
    color:#111827;
}

/* Quantity */
.qty-input{
    width:60px;
    padding:6px;
    text-align:center;
    border:1px solid #cbd5e1;
    border-radius:6px;
}

/* Subtotal */
.subtotal{
    font-weight:600;
    color:#2563eb;
}

/* Remove */
.remove-btn{
    color:#ef4444;
    font-size:13px;
    text-decoration:none;
}

.remove-btn:hover{
    text-decoration:underline;
}

/* Update Button */
.update-btn{
    margin-top:20px;
    padding:10px 22px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:500;
}

.update-btn:hover{
    background:#1e40af;
}

/* Summary Card */
.summary-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.05);
    height:fit-content;
}

.summary-box h3{
    margin-bottom:20px;
}

.total-line{
    display:flex;
    justify-content:space-between;
    font-size:18px;
    margin-bottom:20px;
}

.total-amount{
    font-weight:700;
    font-size:22px;
    color:#111827;
}

.checkout-btn{
    width:100%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}

.checkout-btn:hover{
    background:#15803d;
}

/* Empty cart */
.empty-cart{
    background:white;
    padding:60px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

</style>
</head>
<body>

<div class="header">
    E-Shop Shopping Cart
</div>

<div class="container">

<!-- Empty Cart -->
<div th:if="${#lists.isEmpty(cartItems)}" class="empty-cart">
    <h2>Your cart is empty 🛒</h2>
    <a th:href="@{/}">Continue Shopping</a>
</div>

<!-- Cart Section -->
<form th:if="${!#lists.isEmpty(cartItems)}"
      th:action="@{/cart-api/cart/updateAll}"
      method="post"
      class="cart-box">

<table>
<thead>
<tr>
    <th>Product</th>
    <th>Price</th>
    <th>Qty</th>
    <th>Subtotal</th>
    <th></th>
</tr>
</thead>

<tbody>
<tr th:each="item : ${cartItems}"
    th:attr="data-price=${item.price}"
    class="cart-row">

<td>
    <div class="product-info">
        <img class="product-img"
             th:src="@{${item.product.image.productImgUrl}}">
        <span th:text="${item.product.productName}"></span>
    </div>
</td>

<td class="price">₹<span th:text="${item.price}"></span></td>

<td>
    <input type="number"
           min="1"
           class="qty-input"
           th:name="${'quantity_' + item.product.productId}"
           th:value="${item.quantity}">
</td>

<td class="subtotal">
    ₹<span th:text="${item.quantity * item.price}"></span>
</td>

<td>
    <a th:href="@{/cart-api/cart/remove/{id}(id=${item.product.productId})}"
       class="remove-btn">Remove</a>
</td>

</tr>
</tbody>
</table>

<!--<button type="submit" class="update-btn">
    Update Cart
</button>
-->
</form>

<!-- Summary -->
<div th:if="${!#lists.isEmpty(cartItems)}" class="summary-box">

<h3>Order Summary</h3>

<div class="total-line">
    <span>Total</span>
    <span class="total-amount">₹<span id="cartTotal" th:text="${cartTotal}"></span></span>
</div>

<a th:href="@{/order-api/checkout}">
    <button class="checkout-btn">Proceed to Checkout</button>
</a>

</div>

</div>

<script>
function updateCartTotals() {
    let total = 0;

    document.querySelectorAll(".cart-row").forEach(row => {
        let price = parseFloat(row.dataset.price);
        let qty = row.querySelector(".qty-input").value;
        let subtotal = price * qty;

        row.querySelector(".subtotal span").innerText = subtotal;
        total += subtotal;
    });

    document.getElementById("cartTotal").innerText = total;
}

document.addEventListener("input", function(e){
    if(e.target.classList.contains("qty-input")){
        updateCartTotals();
    }
});

updateCartTotals();
</script>

</body>
</html>
