<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product | Seller Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-color: #232f3e;
    --accent-color: #ff9900;
    --light-bg: #f4f6f9;
    --card-radius: 14px;
    --shadow-soft: 0 4px 15px rgba(0,0,0,0.06);
    --shadow-hover: 0 10px 30px rgba(0,0,0,0.12);
    --muted-border: #e2e8f0;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--light-bg);
}

/* Header */
.page-header {
    background: white;
    padding: 1.8rem;
    border-radius: var(--card-radius);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--muted-border);
    margin-bottom: 2rem;
}

/* Card */
.form-label {
    font-weight: 500;
    color: #374151;   /* slightly darker gray */
}
.form-check-input {
    width: 18px;
    height: 18px;
    border: 2px solid #374151;
    cursor: pointer;
}

.form-check-input:checked {
    background-color: #232f3e;
    border-color: #232f3e;
}
.form-card {
    background: white;
    border-radius: var(--card-radius);
    padding: 2rem;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--muted-border);
    transition: 0.3s ease;
}

.form-card:hover {
    box-shadow: var(--shadow-hover);
}

/* Inputs */
.form-control, .form-select {
    border-radius: 10px;
    padding: 0.75rem 1rem;
    border: 1px solid var(--muted-border);
    transition: 0.2s;
}

.form-control:focus, .form-select:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(35,47,62,0.05);
}

/* Section Title */
.section-title {
    font-weight: 600;
    margin-bottom: 1.2rem;
    color: var(--primary-color);
}

/* Buttons */
.btn-dark-custom {
    background: var(--primary-color);
    border: none;
    color: white;
    border-radius: 10px;
    padding: 0.6rem 1.5rem;
    transition: 0.3s;
}

.btn-dark-custom:hover {
    background: #1a2533;
    transform: translateY(-2px);
}

.btn-outline-custom {
    border: 1px solid var(--primary-color);
    color: var(--primary-color);
    border-radius: 10px;
    padding: 0.6rem 1.5rem;
}

.btn-outline-custom:hover {
    background: var(--primary-color);
    color: white;
}
</style>
</head>

<body>

<div class="container py-4">

    <!-- HEADER -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h4 class="fw-bold mb-1">
                <i class="bi bi-plus-circle me-2"></i>Add New Product
            </h4>
            <p class="text-muted mb-0">Fill the details below to list your product</p>
        </div>

        <a th:href="@{/seller-api/manage-seller-products}" 
           class="btn btn-outline-custom">
            <i class="bi bi-arrow-left me-2"></i>Back
        </a>
    </div>

    <!-- FORM CARD -->
    <div class="form-card">

		<form th:action="@{/seller-api/add-products}" method="post">

		    <!-- PRODUCT INFORMATION -->
		    <div class="mb-4">
		        <div class="section-title">Product Information</div>

		        <div class="mb-3">
		            <label class="form-label">Product Name</label>
		            <input type="text" name="productName"
		                   class="form-control"
		                   placeholder="Ex: Wireless Bluetooth Headphones"
		                   required>
		        </div>

		        <div class="mb-3">
		            <label class="form-label">Description</label>
		            <textarea name="description"
		                      rows="4"
		                      class="form-control"
		                      placeholder="Briefly describe the product, key features, and usage."></textarea>
		        </div>

		        <div class="mb-3">
		            <label class="form-label">Category</label>
		            <select name="categoryId" class="form-select" required>
		                <option value="">Select Category</option>
		                <option th:each="cat : ${categoryList}"
		                        th:value="${cat.categoryId}"
		                        th:text="${cat.categoryName}">
		                </option>
		            </select>
		        </div>
		    </div>

		    <!-- PRICING & INVENTORY -->
		    <div class="mb-4">
		        <div class="section-title">Pricing & Inventory</div>

		        <div class="row">
		            <div class="col-md-6 mb-3">
		                <label class="form-label">Price (₹)</label>
		                <input type="number" step="0.01" name="price"
		                       class="form-control"
		                       placeholder="e.g., 999.99" required>
		            </div>

		            <div class="col-md-6 mb-3">
		                <label class="form-label">Stock Quantity</label>
		                <input type="number" name="stock"
		                       class="form-control"
		                       placeholder="Enter available quantity, e.g., 20" required>
		            </div>
		        </div>
		    </div>

		    <!-- PRODUCT STATUS -->
		    <div class="mb-4">
		        <div class="section-title">Product Status</div>

		        <div class="form-check">
		            <input class="form-check-input" type="checkbox" name="active" value="true">
		            <label class="form-check-label">
		                Make this product active
		            </label>
		        </div>
		    </div>

		    <!-- ACTION BUTTONS -->
		    <div class="d-flex justify-content-end gap-3">
		        <a th:href="@{/seller-api/manage-seller-products}" class="btn btn-outline-custom">
		            Cancel
		        </a>

		        <button type="submit" class="btn btn-dark-custom">
		            <i class="bi bi-check-circle me-2"></i>Save Product
		        </button>
		    </div>

		</form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
